{% extends "base.html" %}

{% block title %}Оформление - Мессенджер{% endblock %}

{% block content %}
<style>
    .app-container, .sidebar, .main-content { display: none; }

    .theme-page {
        min-height: 100vh;
        background: var(--bg-primary);
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }

    .theme-card {
        background: var(--bg-secondary);
        width: 100%;
        max-width: 560px;
        min-height: 100vh;
    }

    .theme-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg-secondary);
        z-index: 10;
    }

    .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: transparent;
        border: none;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        flex-shrink: 0;
        transition: background 0.2s;
    }
    .back-btn:hover { background: var(--bg-tertiary); }

    .theme-header h1 {
        font-size: 19px;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0;
    }

    /* Секции */
    .section {
        padding: 24px 16px 0;
    }

    .section-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 12px;
        padding: 0 4px;
    }

    .section-box {
        background: var(--bg-tertiary);
        border-radius: 16px;
        overflow: hidden;
        padding: 20px;
    }

    /* Тема */
    .theme-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .theme-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px;
        border-radius: 12px;
        transition: background 0.15s;
        background: none;
        border: none;
        color: inherit;
    }

    .theme-option:hover { background: var(--bg-hover); }

    .theme-preview {
        width: 100%;
        aspect-ratio: 9/7;
        border-radius: 10px;
        overflow: hidden;
        border: 2px solid transparent;
        transition: border-color 0.2s;
        position: relative;
    }

    .theme-option.active .theme-preview {
        border-color: var(--accent);
    }

    .theme-option.active .theme-label {
        color: var(--accent);
        font-weight: 600;
    }

    .theme-label {
        font-size: 13px;
        color: var(--text-secondary);
        transition: color 0.2s;
    }

    /* Превью тёмной темы */
    .preview-dark {
        background: #1f2c33;
        display: flex;
        flex-direction: column;
    }
    .preview-dark .p-header { height: 28%; background: #2a3942; display: flex; align-items: center; padding: 0 8px; gap: 5px; }
    .preview-dark .p-avatar { width: 14px; height: 14px; border-radius: 50%; background: #00a884; }
    .preview-dark .p-name { width: 40%; height: 5px; background: #fff; border-radius: 3px; opacity: 0.7; }
    .preview-dark .p-msgs { flex: 1; padding: 6px; display: flex; flex-direction: column; gap: 4px; justify-content: flex-end; }
    .preview-dark .p-msg-r { align-self: flex-start; height: 7px; border-radius: 4px; background: #2a3942; }
    .preview-dark .p-msg-s { align-self: flex-end; height: 7px; border-radius: 4px; background: #005c4b; }
    .preview-dark .p-input { height: 20%; background: #2a3942; margin: 0 6px 6px; border-radius: 8px; }

    /* Превью светлой темы */
    .preview-light {
        background: #ffffff;
        display: flex;
        flex-direction: column;
    }
    .preview-light .p-header { height: 28%; background: #f0f2f5; display: flex; align-items: center; padding: 0 8px; gap: 5px; }
    .preview-light .p-avatar { width: 14px; height: 14px; border-radius: 50%; background: #25a87e; }
    .preview-light .p-name { width: 40%; height: 5px; background: #111b21; border-radius: 3px; opacity: 0.5; }
    .preview-light .p-msgs { flex: 1; padding: 6px; display: flex; flex-direction: column; gap: 4px; justify-content: flex-end; }
    .preview-light .p-msg-r { align-self: flex-start; height: 7px; border-radius: 4px; background: #f0f2f5; }
    .preview-light .p-msg-s { align-self: flex-end; height: 7px; border-radius: 4px; background: #d9fdd3; }
    .preview-light .p-input { height: 20%; background: #f0f2f5; margin: 0 6px 6px; border-radius: 8px; }

    /* Превью системной (половина тёмной + половина светлой) */
    .preview-system {
        display: flex;
        flex-direction: row;
    }
    .preview-system .ps-half {
        width: 50%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .preview-system .ps-dark { background: #1f2c33; }
    .preview-system .ps-light { background: #ffffff; }
    .preview-system .ps-header { height: 28%; display: flex; align-items: center; padding: 0 6px; gap: 4px; }
    .preview-system .ps-dark .ps-header { background: #2a3942; }
    .preview-system .ps-light .ps-header { background: #f0f2f5; }
    .preview-system .ps-avatar { width: 10px; height: 10px; border-radius: 50%; }
    .preview-system .ps-dark .ps-avatar { background: #00a884; }
    .preview-system .ps-light .ps-avatar { background: #25a87e; }
    .preview-system .ps-msgs { flex: 1; padding: 4px; display: flex; flex-direction: column; gap: 3px; justify-content: flex-end; }
    .preview-system .ps-msg { height: 6px; border-radius: 3px; }
    .preview-system .ps-dark .ps-msg-r { background: #2a3942; width: 70%; }
    .preview-system .ps-dark .ps-msg-s { background: #005c4b; width: 55%; align-self: flex-end; }
    .preview-system .ps-light .ps-msg-r { background: #f0f2f5; width: 70%; }
    .preview-system .ps-light .ps-msg-s { background: #d9fdd3; width: 55%; align-self: flex-end; }
    .preview-system .ps-input { height: 18%; margin: 0 4px 4px; border-radius: 5px; }
    .preview-system .ps-dark .ps-input { background: #2a3942; }
    .preview-system .ps-light .ps-input { background: #f0f2f5; }

    /* Чекмарк */
    .theme-check {
        position: absolute;
        bottom: 6px;
        right: 6px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        display: none;
        align-items: center;
        justify-content: center;
    }
    .theme-option.active .theme-check { display: flex; }

    /* Акцентный цвет */
    .accent-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
    }

    .accent-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 4px;
        border-radius: 10px;
        transition: background 0.15s;
        background: none;
        border: none;
        color: inherit;
    }

    .accent-option:hover { background: var(--bg-hover); }

    .accent-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid transparent;
        transition: border-color 0.2s, transform 0.15s;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .accent-option.active .accent-circle {
        border-color: var(--text-primary);
        transform: scale(1.1);
    }

    .accent-check {
        color: #fff;
        display: none;
    }

    .accent-option.active .accent-check { display: block; }

    .accent-label {
        font-size: 11px;
        color: var(--text-secondary);
        transition: color 0.2s;
    }

    .accent-option.active .accent-label {
        color: var(--text-primary);
        font-weight: 600;
    }

    /* Превью-сообщение */
    .preview-section {
        padding: 24px 16px 30px;
    }

    .preview-bubble-wrap {
        background: var(--bg-tertiary);
        border-radius: 16px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .preview-msg {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
    }

    .preview-msg-received {
        background: var(--received-message);
        color: var(--text-primary);
        align-self: flex-start;
        border: 1px solid var(--border);
    }

    .preview-msg-sent {
        background: var(--accent);
        color: #fff;
        align-self: flex-end;
    }

    .preview-msg-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
    }

    .preview-msg-label.right { text-align: right; }

    @media (max-width: 560px) {
        .theme-card { max-width: 100%; }
        .accent-circle { width: 38px; height: 38px; }
    }
</style>

<div class="theme-page">
<div class="theme-card">

    <div class="theme-header">
        <a href="{{ url_for('security') }}" class="back-btn" title="Назад">
            <svg width="22" height="22" viewBox="0 0 1024 1024">
                <use xlink:href="#icon-back"></use>
            </svg>
        </a>
        <h1>Оформление</h1>
    </div>

    <!-- Тема -->
    <div class="section" style="margin-top: 8px;">
        <div class="section-title">Тема</div>
        <div class="section-box">
            <div class="theme-grid">

                <button class="theme-option" data-theme-btn="system" onclick="ThemeManager.setTheme('system')">
                    <div class="theme-preview preview-system">
                        <div class="ps-half ps-dark">
                            <div class="ps-header"><div class="ps-avatar"></div></div>
                            <div class="ps-msgs">
                                <div class="ps-msg ps-msg-r"></div>
                                <div class="ps-msg ps-msg-s"></div>
                            </div>
                            <div class="ps-input"></div>
                        </div>
                        <div class="ps-half ps-light">
                            <div class="ps-header"><div class="ps-avatar"></div></div>
                            <div class="ps-msgs">
                                <div class="ps-msg ps-msg-r"></div>
                                <div class="ps-msg ps-msg-s"></div>
                            </div>
                            <div class="ps-input"></div>
                        </div>
                        <div class="theme-check">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </div>
                    <span class="theme-label">Система</span>
                </button>

                <button class="theme-option" data-theme-btn="light" onclick="ThemeManager.setTheme('light')">
                    <div class="theme-preview preview-light">
                        <div class="p-header"><div class="p-avatar"></div><div class="p-name"></div></div>
                        <div class="p-msgs">
                            <div class="p-msg-r" style="width:60%"></div>
                            <div class="p-msg-s" style="width:50%"></div>
                        </div>
                        <div class="p-input"></div>
                        <div class="theme-check">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </div>
                    <span class="theme-label">Светлая</span>
                </button>

                <button class="theme-option" data-theme-btn="dark" onclick="ThemeManager.setTheme('dark')">
                    <div class="theme-preview preview-dark">
                        <div class="p-header"><div class="p-avatar"></div><div class="p-name"></div></div>
                        <div class="p-msgs">
                            <div class="p-msg-r" style="width:60%"></div>
                            <div class="p-msg-s" style="width:50%"></div>
                        </div>
                        <div class="p-input"></div>
                        <div class="theme-check">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </div>
                    <span class="theme-label">Тёмная</span>
                </button>

            </div>
        </div>
    </div>

    <!-- Акцентный цвет -->
    <div class="section" style="margin-top: 24px;">
        <div class="section-title">Акцентный цвет</div>
        <div class="section-box">
            <div class="accent-grid">

                <button class="accent-option" data-accent-btn="green" onclick="ThemeManager.setAccent('green')">
                    <div class="accent-circle" style="background:#00a884;">
                        <svg class="accent-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span class="accent-label">Зелёный</span>
                </button>

                <button class="accent-option" data-accent-btn="olive" onclick="ThemeManager.setAccent('olive')">
                    <div class="accent-circle" style="background:#8fb33a;">
                        <svg class="accent-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span class="accent-label">Оливковый</span>
                </button>

                <button class="accent-option" data-accent-btn="blue" onclick="ThemeManager.setAccent('blue')">
                    <div class="accent-circle" style="background:#3b9edd;">
                        <svg class="accent-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span class="accent-label">Синий</span>
                </button>

                <button class="accent-option" data-accent-btn="red" onclick="ThemeManager.setAccent('red')">
                    <div class="accent-circle" style="background:#e05c4f;">
                        <svg class="accent-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span class="accent-label">Красный</span>
                </button>

                <button class="accent-option" data-accent-btn="purple" onclick="ThemeManager.setAccent('purple')">
                    <div class="accent-circle" style="background:#9f60f5;">
                        <svg class="accent-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <span class="accent-label">Фиолетовый</span>
                </button>

            </div>
        </div>
    </div>

    <!-- Предпросмотр -->
    <div class="preview-section">
        <div class="section-title" style="padding: 0 4px; margin-bottom: 12px;">Предпросмотр</div>
        <div class="preview-bubble-wrap">
            <div>
                <div class="preview-msg preview-msg-received">Привет! Как дела? 👋</div>
                <div class="preview-msg-label">10:41</div>
            </div>
            <div style="align-self: flex-end; display: flex; flex-direction: column; align-items: flex-end;">
                <div class="preview-msg preview-msg-sent">Всё отлично, спасибо!</div>
                <div class="preview-msg-label right">10:42 ✓✓</div>
            </div>
        </div>
    </div>

</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var s = ThemeManager.get();
    // Подсветить активные кнопки
    document.querySelectorAll('[data-theme-btn]').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-theme-btn') === s.theme);
    });
    document.querySelectorAll('[data-accent-btn]').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-accent-btn') === s.accent);
    });
});
</script>
{% endblock %}
